<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self';
                   style-src 'self';
                   connect-src 'self' http://localhost:3000 ws://localhost:3000;
                   img-src 'self' data:;
                   font-src 'self';
                   object-src 'none';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaVa-Vak - Chat</title>
    <link rel="stylesheet" href="css/chat.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div>
            <h1>💬 PaVa-Vak</h1>
        </div>
        <div class="header-actions">
            <span id="currentUsername">User</span>
<button id="settingsBtn" class="logout-btn">Settings</button>
            <button id="adminButton">Admin</button>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>
    <div class="chat-container">
        <!-- Conversations List -->
        <div class="conversations-list" id="conversationsList">
            <div class="conversations-header">
                <h2>Conversations</h2>
            </div>
            <div id="conversationsContainer">
                <div class="empty-state">
                    Loading conversations...
                </div>
            </div>
        </div>
        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">
            <!-- No conversation selected -->
            <div id="noConversation">
                <div>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                    </svg>
                    <p>Select a conversation to start chatting</p>
                    <button id="backToConversations">
                        ← Back to Conversations
                    </button>
                </div>
            </div>
            <!-- Active conversation -->
            <div id="activeConversation">
                <!-- Chat Header -->
                <div class="chat-header">
                    <div id="chatUsername">User</div>
                    <div id="chatUserStatus">Offline</div>
                </div>
                <!-- Messages -->
                <div class="messages-container" id="messagesContainer">
                    <!-- Messages will be loaded here -->
                </div>
                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typingIndicator">
                    <span id="typingUsername">User</span> is typing...
                </div>
                <!-- Message Input -->
                <div class="message-input-container">
                    <div class="message-input-form">
                        <input 
                            type="text" 
                            id="messageInput" 
                            placeholder="Type a message..."
                        >
                        <button class="send-btn" id="sendBtn">
                            Send
                        </button>
                    </div>
                    <div class="message-hint">
                        Press Enter to send
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <p id="toastMessage"></p>
    </div>
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Chat JS -->
    <script src="js/chat.js"></script>
</body>
</html>
