<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self';
                   style-src 'self';
                   connect-src 'self' http://localhost:3000 ws://localhost:3000 wss://localhost:3000 http://144.24.129.194:3000 ws://144.24.129.194:3000;
                   img-src 'self' data:;
                   font-src 'self';
                   manifest-src 'self';
                   worker-src 'self' blob:;
                   object-src 'none';">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a73e8" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PaVa-Vak" />
    <meta name="application-name" content="PaVa-Vak" />
    <meta name="description" content="PaVa-Vak — Private Family Chat" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <title>PaVa-Vak - Chat</title>

    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/applock.css">
</head>
<body>

    <div id="app-lock-overlay"></div>

    <div id="pwa-install-banner" class="pwa-banner">
        📲 Install PaVa-Vak for quick access from your home screen!
        <button id="pwa-banner-install-btn" class="pwa-banner-install">Install</button>
        <button id="pwa-banner-close-btn" class="pwa-banner-close">Not Now</button>
    </div>

    <!-- Header -->
    <div class="header">
        <div>
            <h1>💬 PaVa-Vak</h1>
        </div>
        <div class="header-actions">
            <span id="currentUsername">User</span>
            <button id="settingsBtn" class="logout-btn">⚙️ Settings</button>
            <button id="adminButton" class="hidden">Admin</button>
            <button id="pwa-install-btn" class="pwa-header-install hidden">📲 Install</button>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>

    <div class="chat-container">

        <!-- Conversations List -->
        <div class="conversations-list" id="conversationsList">
            <div class="conversations-header">
                <h2>Conversations</h2>
            </div>
            <div id="conversationsContainer">
                <div class="empty-state">Loading conversations...</div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area" id="chatArea">

            <!-- No conversation selected — visible by default -->
            <div id="noConversation">
                <div>
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z">
                        </path>
                    </svg>
                    <p>Select a conversation to start chatting</p>
                    <button id="backToConversations">← Back to Conversations</button>
                </div>
            </div>

            <!-- Active conversation — hidden until a conversation is selected -->
            <div id="activeConversation" class="hidden">

                <!-- Chat Header -->
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div id="chatUsername">User</div>
                        <div id="chatUserStatus">● Offline</div>
                    </div>
                    <div class="chat-header-menu">
                        <button id="chatMenuBtn" class="chat-menu-btn" aria-label="Chat options">⋮</button>
                        <div id="chatMenuDropdown" class="chat-menu-dropdown">
                            <button id="selectMsgsBtn" class="chat-menu-option">☑ Select messages</button>
                            <button id="clearChatBtn" class="chat-menu-option chat-menu-danger">🗑 Clear chat</button>
                        </div>
                    </div>
                </div>

                <!-- Selection toolbar — hidden until selection mode active -->
                <div id="selectionToolbar" class="selection-toolbar">
                    <button id="cancelSelectBtn" class="sel-btn sel-cancel">✕ Cancel</button>
                    <span id="selectedCount" class="sel-count">0 selected</span>
                    <button id="deleteSelectBtn" class="sel-btn sel-delete" disabled>🗑 Delete</button>
                </div>

                <!-- Messages -->
                <div class="messages-container" id="messagesContainer"></div>

                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typingIndicator">
                    <span id="typingUsername">User</span> is typing...
                </div>

                <!-- Message Input -->
                <div class="message-input-container">
                    <div class="message-input-form">
                        <input
                            type="text"
                            id="messageInput"
                            placeholder="Type a message..."
                            autocomplete="off"
                            autocorrect="on"
                            autocapitalize="sentences"
                            spellcheck="true"
                            enterkeyhint="send"
                        >
                        <button class="send-btn" id="sendBtn">Send</button>
                    </div>
                    <div class="message-hint">Press Enter to send</div>
                </div>

            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"><p id="toastMessage"></p></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/applock.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/pwa.js"></script>

</body>
</html>
