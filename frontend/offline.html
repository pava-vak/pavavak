<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a73e8" />
  <title>PaVa-Vak — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1419;
      color: #e7e9ea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      text-align: center;
      gap: 20px;
    }

    .icon {
      font-size: 72px;
      line-height: 1;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.6; transform: scale(0.95); }
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
    }

    p {
      font-size: 1rem;
      color: #8899a6;
      max-width: 320px;
      line-height: 1.5;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ea4335;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status {
      font-size: 0.85rem;
      color: #8899a6;
    }

    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 24px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    button:hover  { background: #1557b0; }
    button:active { transform: scale(0.97); }

    .hint {
      font-size: 0.8rem;
      color: #546576;
    }
  </style>
</head>
<body>

  <div class="icon">📡</div>

  <h1>You're Offline</h1>

  <p>PaVa-Vak needs a connection to send and receive messages. Check your internet and try again.</p>

  <div class="status">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">No connection detected</span>
  </div>

  <button onclick="tryReload()">Try Again</button>

  <p class="hint">Your messages are safe — they'll deliver once you're back online.</p>

  <script>
    function tryReload() {
      if (navigator.onLine) {
        window.location.href = '/';
      } else {
        const btn = document.querySelector('button');
        btn.textContent = 'Still offline...';
        setTimeout(() => { btn.textContent = 'Try Again'; }, 2000);
      }
    }

    function updateStatus() {
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (navigator.onLine) {
        dot.style.background  = '#34a853';
        text.textContent      = 'Connection restored — reloading…';
        setTimeout(() => { window.location.href = '/'; }, 1200);
      } else {
        dot.style.background  = '#ea4335';
        text.textContent      = 'No connection detected';
      }
    }

    window.addEventListener('online',  updateStatus);
    window.addEventListener('offline', updateStatus);
    updateStatus();
  </script>
</body>
</html>
